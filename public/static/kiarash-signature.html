<script>
(function () {
  var wrap = document.currentScript.previousElementSibling;
  while (wrap && !wrap.classList.contains('kiarash-signature')) wrap = wrap.previousElementSibling;
  if (!wrap) wrap = document.querySelector('.kiarash-signature');
  var svg = wrap.querySelector('svg');
  var glyphs = [].slice.call(wrap.querySelectorAll('.ks-glyph'));
  var clips = [].slice.call(wrap.querySelectorAll('clipPath > rect'));
  var flourish = wrap.querySelector('.ks-flourish');
  var ease = function (e) { return e < 0.5 ? 2*e*e : 1 - Math.pow(-2*e+2, 2)/2; };

  function reset() {
    clips.forEach(function (r) { r.setAttribute('width', 0); });
    var fl = flourish.getTotalLength();
    flourish.style.transition = 'none';
    flourish.style.strokeDasharray = fl;
    flourish.style.strokeDashoffset = fl;
  }

  function play() {
    reset();
    var boxes = glyphs.map(function (el) { return el.getBBox(); });
    var pad = 7;
    var x0 = Math.min.apply(null, boxes.map(function (b) { return b.x; })) - pad;
    var x1 = Math.max.apply(null, boxes.map(function (b) { return b.x + b.width; })) + pad;
    var dur = 2600, t0 = performance.now();
    function step(t) {
      var e = Math.min(1, (t - t0) / dur), front = x0 + (x1 - x0) * ease(e);
      glyphs.forEach(function (el, i) {
        var b = boxes[i], r = clips[i];
        r.setAttribute('x', b.x - pad);
        r.setAttribute('y', b.y - pad);
        r.setAttribute('height', b.height + pad * 2);
        r.setAttribute('width', Math.max(0, Math.min(b.width + pad * 2, front - (b.x - pad))));
      });
      if (e < 1) requestAnimationFrame(step);
      else {
        var fl = flourish.getTotalLength();
        flourish.style.transition = 'stroke-dashoffset 820ms cubic-bezier(.4,.1,.3,1)';
        flourish.style.strokeDashoffset = 0;
      }
    }
    requestAnimationFrame(step);
  }

  // Play when it scrolls into view; replay on click
  reset();
  var seen = false;
  if ('IntersectionObserver' in window) {
    var io = new IntersectionObserver(function (entries) {
      entries.forEach(function (en) { if (en.isIntersecting && !seen) { seen = true; play(); } });
    }, { threshold: 0.4 });
    io.observe(wrap);
  } else { play(); }
  wrap.style.cursor = 'pointer';
  wrap.addEventListener('click', play);
})();
</script>
